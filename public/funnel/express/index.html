<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  :root{
    /* match the exact cream the mascot mp4s are baked on, so multiply blends seamlessly */
    --cream:#FCF0DB;
    --canvas:#FCF0DB;
  }
  *,*::before,*::after{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; }
  body{
    background:var(--canvas);
    font-family:var(--font-body,"Fredoka",system-ui,sans-serif);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    display:grid; place-items:center;
    overflow:hidden;
  }

  /* ---------- screen fit (flat, no phone bezel — exports clean) ---------- */
  .stage{ position:fixed; inset:0; display:grid; place-items:center; }
  .frame{
    position:relative;
    width:390px; height:844px;
    border-radius:0;
    background:var(--canvas);
    overflow:hidden;
    transform-origin:center center;
  }

  /* ---------- screen system ---------- */
  .screen{
    position:absolute; inset:0;
    display:flex; flex-direction:column;
    padding:0;
    opacity:0; visibility:hidden;
    transform:translateY(10px) scale(.996);
    transition:opacity .42s ease, transform .42s cubic-bezier(.5,.15,.2,1), visibility .42s;
    z-index:1;
  }
  .screen.is-active{ opacity:1; visibility:visible; transform:none; z-index:2; }

  /* paint helpers */
  .sun{
    position:absolute; pointer-events:none; z-index:1;
    background:url("../assets/sun.png") center/contain no-repeat;
    mix-blend-mode:multiply;
  }
  .sakura{
    position:absolute; top:-6px; right:-14px; width:240px;
    mix-blend-mode:multiply; opacity:.9; pointer-events:none; z-index:6;
    transform:rotate(-3deg);
  }
  .kslot{ position:relative; overflow:hidden; }
  .kslot video,.kslot img{ width:100%; height:100%; object-fit:cover; display:block; mix-blend-mode:multiply; }

  /* ===================================================== */
  /*  QUIZ CHROME — top bar with back + progress           */
  /* ===================================================== */
  .topbar{
    position:relative; z-index:8;
    display:flex; align-items:center; gap:12px;
    padding:18px 20px 6px;
  }
  .iconbtn{
    width:38px; height:38px; flex:0 0 38px;
    border-radius:13px; border:1px solid var(--hairline);
    background:rgba(255,255,255,.6); backdrop-filter:blur(8px);
    display:grid; place-items:center; cursor:pointer;
    color:var(--ink); transition:transform .15s ease, background .15s ease;
  }
  .iconbtn:hover{ background:#fff; }
  .iconbtn:active{ transform:scale(.94); }
  .iconbtn svg{ width:17px; height:17px; }
  .progress{ flex:1; height:7px; border-radius:999px; background:rgba(27,27,27,.10); overflow:hidden; }
  .progress > i{
    display:block; height:100%; width:8%;
    background:linear-gradient(90deg,var(--moss-1),var(--moss));
    border-radius:999px;
    transition:width .5s cubic-bezier(.5,.15,.2,1);
  }
  .stepno{
    font-family:var(--font-mono); font-size:11px; font-weight:600;
    color:var(--ink-soft); letter-spacing:.04em; font-variant-numeric:tabular-nums;
    flex:0 0 auto; min-width:38px; text-align:right;
  }

  /* asker — small kokoro + label, used atop question screens */
  .asker{ display:flex; align-items:center; gap:11px; padding:14px 24px 0; }
  .asker .ava{
    position:relative; width:52px; height:52px; flex:0 0 52px; border-radius:50%;
    overflow:hidden; background:var(--cream-warm);
    box-shadow:0 0 0 2px var(--paper-card), 0 0 0 3.5px var(--moss-soft), 0 7px 16px -8px rgba(80,72,40,.45);
  }
  .asker .ava .ava-poster,
  .asker .ava .ava-vid{
    position:absolute; inset:0; width:100%; height:100%; object-fit:cover;
    transform:scale(1.7); transform-origin:68% 34%;
  }
  .asker .ava .ava-vid{ opacity:0; transition:opacity .5s ease; }
  .asker .ava .ava-vid.ready{ opacity:1; }
  .asker .meta{ display:flex; flex-direction:column; gap:2px; }
  .asker .name{
    font-family:var(--font-body); font-weight:700; font-size:13px; color:var(--ink);
    letter-spacing:-.01em; display:flex; align-items:center; gap:6px;
  }
  .asker .name .jp{ font-family:var(--font-jp); color:var(--sunset); font-weight:800; font-size:12px; }
  .asker .role{
    font-size:10px; font-weight:700; letter-spacing:.16em; text-transform:uppercase;
    color:var(--moss); display:flex; align-items:center; gap:6px;
  }
  .asker .role .live{ width:6px; height:6px; border-radius:50%; background:var(--moss); animation:blink 1.5s ease-in-out infinite; }
  @keyframes blink{ 0%,100%{opacity:1; transform:scale(1)} 50%{opacity:.4; transform:scale(.7)} }

  .qbody{ flex:1; display:flex; flex-direction:column; padding:18px 24px 0; min-height:0; }
  .qtitle{
    font-family:var(--font-display); font-weight:800; font-size:27px; line-height:1.12;
    letter-spacing:-.025em; color:var(--ink); margin:0; text-wrap:balance;
  }
  .qhelp{ font-size:13.5px; font-weight:500; color:var(--ink-muted); margin:10px 0 0; line-height:1.45; max-width:30ch; }

  /* footer CTA region */
  .qfoot{ padding:14px 24px calc(22px + env(safe-area-inset-bottom)); position:relative; z-index:7; }
  .cta{
    width:100%; height:56px; border:none; cursor:pointer;
    border-radius:999px; background:var(--mustard); color:var(--ink);
    font-family:var(--font-display); font-weight:700; font-size:16.5px;
    display:inline-flex; align-items:center; justify-content:center; gap:9px;
    box-shadow:0 8px 20px -8px rgba(236,195,74,.7);
    transition:transform .14s ease, box-shadow .18s ease, opacity .2s ease, background .15s ease;
  }
  .cta:hover{ box-shadow:0 12px 26px -8px rgba(236,195,74,.85); }
  .cta:active{ transform:translateY(1px); }
  .cta:disabled{ opacity:.4; cursor:not-allowed; box-shadow:none; transform:none; background:var(--cream-deep); color:var(--ink-soft); }
  .cta svg{ width:18px; height:18px; }
  .ghost{
    display:block; width:100%; margin:13px auto 0; padding:6px;
    background:none; border:none; cursor:pointer;
    font-family:var(--font-body); font-size:13px; font-weight:500; color:var(--ink-muted);
    text-decoration:underline; text-underline-offset:4px; text-decoration-thickness:1px;
  }
  .ghost:hover{ color:var(--ink); }

  /* ===================================================== */
  /*  SCREEN 1 — HERO                                       */
  /* ===================================================== */
  #scr-hero{ background:var(--canvas); }
  #scr-hero .sun{ width:360px; height:360px; right:-110px; top:-72px; opacity:.42; }
  .hero-top{ position:relative; z-index:7; padding:58px 30px 0; text-align:center; }
  .hero-eyebrow{
    display:inline-flex; align-items:center; gap:9px;
    font-size:10.5px; font-weight:700; letter-spacing:.15em; text-transform:uppercase;
    color:var(--moss);
  }
  .hero-eyebrow .jp{ font-family:var(--font-jp); color:var(--sunset); font-size:13px; letter-spacing:0; }
  .hero-h1{
    font-family:var(--font-display); font-weight:800; font-size:33px; line-height:1.06;
    letter-spacing:-.03em; color:var(--ink); margin:14px 0 0; text-wrap:balance;
  }
  .hero-h1 em{ font-style:normal; color:var(--moss-dark); }

  .hero-mascot{
    position:absolute; left:50%; top:206px; transform:translateX(-50%);
    width:330px; height:330px; z-index:4; pointer-events:none;
  }
  .hero-mascot .hero-poster,
  .hero-mascot .hero-vid{
    position:absolute; inset:0; width:100%; height:100%; object-fit:contain; display:block;
    -webkit-mask-image:radial-gradient(ellipse 62% 62% at 50% 47%, #000 56%, transparent 88%);
            mask-image:radial-gradient(ellipse 62% 62% at 50% 47%, #000 56%, transparent 88%);
    animation:breath 4.6s ease-in-out infinite;
  }
  .hero-mascot .hero-vid{ opacity:0; transition:opacity .8s ease; }
  .hero-mascot .hero-vid.ready{ opacity:1; }
  @keyframes breath{ 0%,100%{ transform:scale(1) } 50%{ transform:scale(1.018) } }

  .hero-bubble{
    position:absolute; z-index:6; left:50%; top:200px; transform:translateX(-50%);
    background:#fff; border:1.5px solid var(--ink); border-radius:18px;
    padding:9px 15px; box-shadow:3px 3px 0 var(--ink);
    font-family:var(--font-body); font-weight:700; font-size:13.5px; color:var(--ink);
    white-space:nowrap;
  }
  .hero-bubble::after{
    content:""; position:absolute; left:34px; bottom:-10px; transform:rotate(45deg);
    width:15px; height:15px; background:#fff; border-right:1.5px solid var(--ink); border-bottom:1.5px solid var(--ink);
  }

  .hero-foot{
    margin-top:auto; position:relative; z-index:7;
    padding:0 26px calc(24px + env(safe-area-inset-bottom));
    text-align:center;
  }
  .hero-sub{
    font-size:14.5px; font-weight:500; line-height:1.5; color:var(--ink-1);
    margin:0 auto 16px; max-width:32ch;
  }
  .hero-sub b{ font-weight:700; color:var(--ink); }
  .hero-trust{
    margin-top:12px; font-size:11.5px; font-weight:600; color:var(--ink-soft);
    display:flex; align-items:center; justify-content:center; gap:8px;
  }
  .hero-trust .dot{ width:3px; height:3px; border-radius:50%; background:var(--ink-faint); }
  .hero-trust .stars{ color:var(--mustard-dark); letter-spacing:1px; }

  .bonsai{ position:absolute; bottom:206px; left:-18px; width:80px; z-index:3; mix-blend-mode:multiply; pointer-events:none; opacity:.9; }
  .lantern{ position:absolute; bottom:208px; right:-6px; width:56px; z-index:3; mix-blend-mode:multiply; pointer-events:none; opacity:.88; }

  /* short canvases (e.g. iPhone SE) — tighten the hero so the mascot
     never overlaps the footer copy. .short is toggled from fit() in JS. */
  .frame.short #scr-hero .hero-top{ padding-top:34px; }
  .frame.short .hero-h1{ font-size:30px; }
  .frame.short .hero-mascot{ width:248px; height:248px; top:150px; }
  .frame.short .hero-bubble{ top:150px; }
  .frame.short .sakura{ width:200px; }
  .frame.short .bonsai{ bottom:188px; width:66px; }
  .frame.short .lantern{ bottom:190px; width:48px; }
  .frame.short .hero-sub{ margin-bottom:12px; }

  /* ===================================================== */
  /*  SCREEN 2 — Q1 single-select cards                    */
  /* ===================================================== */
  .opts{ display:flex; flex-direction:column; gap:9px; margin-top:20px; }
  .opt{
    position:relative; width:100%; text-align:left; cursor:pointer;
    background:var(--paper-card); border:1.5px solid var(--hairline-strong);
    border-radius:16px; padding:16px 16px 16px 18px;
    display:flex; align-items:center; gap:13px;
    font-family:var(--font-body); transition:transform .12s ease, border-color .18s ease, background .18s ease, box-shadow .18s ease;
  }
  .opt:hover{ background:var(--cream-warm); }
  .opt:active{ transform:scale(.99); }
  .opt .glyph{
    width:34px; height:34px; flex:0 0 34px; border-radius:11px;
    background:var(--cream-warm); display:grid; place-items:center;
    color:var(--moss); transition:background .18s ease, color .18s ease, transform .18s ease;
  }
  .opt .glyph svg{ width:18px; height:18px; }
  .opt .lbl{ flex:1; font-weight:700; font-size:15.5px; color:var(--ink); letter-spacing:-.01em; line-height:1.2; }
  .opt .tick{
    width:22px; height:22px; flex:0 0 22px; border-radius:50%;
    border:2px solid var(--hairline-strong); position:relative; transition:all .18s ease;
  }
  .opt.is-on{
    background:var(--moss); border-color:var(--moss);
    box-shadow:0 10px 22px -10px rgba(120,120,56,.6);
  }
  .opt.is-on .lbl{ color:var(--cream); }
  .opt.is-on .glyph{ background:rgba(255,255,255,.16); color:var(--cream); transform:scale(1.04); }
  .opt.is-on .tick{ border-color:var(--cream); background:var(--cream); }
  .opt.is-on .tick::after{
    content:""; position:absolute; inset:0;
    background:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 12 12'><path d='M2.5 6.2 L5 8.6 L9.5 3.6' stroke='%23787838' stroke-width='2' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>") center/12px no-repeat;
  }

  /* ===================================================== */
  /*  SCREEN 3 — Q2 intensity slider                       */
  /* ===================================================== */
  .gauge{ margin-top:30px; }
  .gauge-readout{ text-align:center; margin-bottom:26px; }
  .gauge-num{
    font-family:var(--font-display); font-weight:800; font-size:74px; line-height:1;
    letter-spacing:-.04em; color:var(--ink); font-variant-numeric:tabular-nums;
    transition:color .3s ease;
  }
  .gauge-num span{ font-size:30px; color:var(--ink-faint); font-weight:700; }
  .gauge-word{
    margin-top:6px; font-family:var(--font-display); font-weight:700; font-size:17px;
    color:var(--moss-dark); letter-spacing:-.01em; min-height:22px; transition:color .3s ease;
  }
  .track{
    position:relative; height:12px; border-radius:999px; margin:0 6px;
    background:var(--cream-deep); cursor:pointer; touch-action:none;
  }
  .track .fill{
    position:absolute; left:0; top:0; bottom:0; width:50%;
    border-radius:999px; background:linear-gradient(90deg,#F2D072,#FC6708);
    transition:width .25s cubic-bezier(.5,.15,.2,1);
  }
  .track .thumb{
    position:absolute; top:50%; left:50%;
    width:30px; height:30px; border-radius:50%; background:#fff;
    border:3px solid var(--sunset);
    box-shadow:0 4px 12px -3px rgba(27,27,27,.28);
    transform:translate(-50%,-50%);
    transition:left .25s cubic-bezier(.5,.15,.2,1);
  }
  .track-ends{
    display:flex; justify-content:space-between; margin:16px 6px 0;
    font-size:11.5px; font-weight:600; color:var(--ink-soft);
  }
  .reflect{
    margin-top:26px;
    background:rgba(255,255,255,.7); border:1px solid var(--hairline);
    border-left:3px solid var(--moss); border-radius:14px;
    padding:14px 16px; display:flex; gap:12px; align-items:flex-start;
    opacity:0; transform:translateY(10px);
    transition:opacity .5s ease, transform .5s cubic-bezier(.5,.15,.2,1);
  }
  .reflect.show{ opacity:1; transform:none; }
  .reflect .rk{
    width:30px; height:30px; flex:0 0 30px; border-radius:50%;
    background:url("../assets/kokoro-face.png") 50% 44% / cover no-repeat, var(--cream-warm);
  }
  .reflect p{ margin:0; font-size:13.5px; font-weight:600; line-height:1.45; color:var(--ink-1); }
  .reflect p .nm{ color:var(--moss); }

  /* ===================================================== */
  /*  SCREEN 4 — Q3 open text                              */
  /* ===================================================== */
  .ta-wrap{ position:relative; margin-top:22px; flex:1; display:flex; flex-direction:column; min-height:0; }
  .ta{
    flex:1; width:100%; resize:none; min-height:150px;
    background:var(--paper-card); border:2px solid var(--hairline-strong);
    border-radius:18px; padding:17px 17px 50px;
    font-family:var(--font-body); font-weight:600; font-size:17px; line-height:1.5; color:var(--ink);
    outline:none; transition:border-color .18s ease, box-shadow .18s ease;
  }
  .ta::placeholder{ color:var(--ink-faint); font-weight:500; }
  .ta:focus{ border-color:var(--moss); box-shadow:0 0 0 4px rgba(120,120,56,.12); }
  .ta-row{
    position:absolute; left:14px; right:14px; bottom:12px;
    display:flex; align-items:center; justify-content:space-between; pointer-events:none;
  }
  .mic{
    pointer-events:auto;
    display:inline-flex; align-items:center; gap:8px; cursor:pointer;
    background:var(--cream-warm); border:1px solid var(--hairline); border-radius:999px;
    padding:7px 13px 7px 10px; color:var(--ink-1);
    font-family:var(--font-body); font-weight:700; font-size:12px;
    transition:background .15s ease, transform .12s ease;
  }
  .mic:hover{ background:#fff; }
  .mic:active{ transform:scale(.96); }
  .mic .ic{ width:24px; height:24px; border-radius:50%; background:var(--sunset); display:grid; place-items:center; color:#fff; }
  .mic .ic svg{ width:12px; height:12px; }
  .ta-count{ font-family:var(--font-mono); font-size:11px; color:var(--ink-faint); font-weight:500; }
  .privacy{
    display:flex; align-items:center; gap:7px; justify-content:center;
    margin-top:14px; font-size:11.5px; font-weight:500; color:var(--ink-soft);
  }
  .privacy svg{ width:13px; height:13px; color:var(--moss); }

  /* ===================================================== */
  /*  Reflection / end overlay                             */
  /* ===================================================== */
  #scr-thanks{ background:var(--canvas); align-items:center; justify-content:center; text-align:center; padding:40px 34px; }
  #scr-thanks .sun{ width:480px; height:480px; left:50%; top:120px; transform:translateX(-50%); opacity:.5; }
  .thanks-mascot{
    width:188px; height:188px; position:relative; z-index:4; margin-bottom:8px;
    -webkit-mask-image:radial-gradient(ellipse 58% 58% at 50% 48%, #000 54%, transparent 88%);
            mask-image:radial-gradient(ellipse 58% 58% at 50% 48%, #000 54%, transparent 88%);
  }
  .thanks-mascot video{ width:100%; height:100%; object-fit:cover; object-position:center 36%; mix-blend-mode:multiply; }
  #scr-thanks .eq{
    position:relative; z-index:5;
    font-size:11px; font-weight:700; letter-spacing:.18em; text-transform:uppercase; color:var(--moss);
  }
  #scr-thanks h2{
    position:relative; z-index:5;
    font-family:var(--font-display); font-weight:800; font-size:30px; line-height:1.12;
    letter-spacing:-.025em; color:var(--ink); margin:12px 0 10px; text-wrap:balance;
  }
  #scr-thanks p{ position:relative; z-index:5; font-size:14.5px; font-weight:500; color:var(--ink-muted); line-height:1.5; margin:0 0 30px; max-width:30ch; }
  #scr-thanks .restart{
    position:relative; z-index:5;
    background:none; border:1.5px solid var(--hairline-strong); border-radius:999px;
    padding:13px 26px; cursor:pointer;
    font-family:var(--font-display); font-weight:700; font-size:14.5px; color:var(--ink);
    transition:background .15s ease, transform .12s ease;
  }
  #scr-thanks .restart:hover{ background:#fff; }
  #scr-thanks .restart:active{ transform:scale(.97); }

  /* thinking overlay */
  .thinking{
    position:absolute; inset:0; z-index:30;
    background:rgba(252,240,219,.86); backdrop-filter:blur(6px);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px;
    opacity:0; visibility:hidden; transition:opacity .4s ease, visibility .4s;
  }
  .thinking.show{ opacity:1; visibility:visible; }
  .thinking .tk{
    width:120px; height:120px; border-radius:50%; overflow:hidden; background:var(--cream-warm);
    box-shadow:0 16px 40px -18px rgba(80,72,40,.5);
  }
  .thinking .tk video{ width:140%; height:140%; margin:-20% 0 0 -20%; object-fit:cover; mix-blend-mode:multiply; }
  .thinking .tt{ font-family:var(--font-display); font-weight:700; font-size:17px; color:var(--ink); letter-spacing:-.01em; }
  .thinking .td{ display:inline-flex; gap:5px; }
  .thinking .td span{ width:7px; height:7px; border-radius:50%; background:var(--moss); animation:td 1.2s ease-in-out infinite; }
  .thinking .td span:nth-child(2){ animation-delay:.15s; }
  .thinking .td span:nth-child(3){ animation-delay:.3s; }
  @keyframes td{ 0%,60%,100%{ transform:translateY(0); opacity:.4; } 30%{ transform:translateY(-5px); opacity:1; } }


  /* ============ FLOW ENGINE ============ */
  .flow{ position:absolute; inset:0; z-index:5; display:none; }
  .flow.show{ display:block; background:var(--canvas); }
  .panel{ position:absolute; inset:0; display:flex; flex-direction:column; }
  .panel.anim{ animation:panelIn .42s cubic-bezier(.5,.15,.2,1); }
  @keyframes panelIn{ from{ opacity:0; transform:translateY(12px);} to{ opacity:1; transform:none;} }
  .qbody{ overflow-y:auto; }
  .qbody::-webkit-scrollbar{ display:none; }
  .qtitle,.qhelp{ flex-shrink:0; }
  .opt .lblwrap{ flex:1; display:flex; flex-direction:column; gap:1px; }
  .opt .lblwrap .lbl{ flex:0 0 auto; }

  .minihead{ position:relative; display:flex; align-items:center; justify-content:center; gap:7px; padding:18px 20px 4px; }
  .minihead .mk{ font-family:var(--font-jp); color:var(--sunset); font-weight:800; font-size:15px; }
  .minihead .nmm{ font-family:var(--font-display); font-weight:800; font-size:15px; letter-spacing:-.01em; color:var(--ink); }
  .minihead .iconbtn{ position:absolute; left:20px; top:12px; }

  /* statement */
  .stmt{ flex:1; display:flex; flex-direction:column; justify-content:center; padding:0 30px; }
  .stmt-mascot{ position:relative; align-self:center; width:152px; height:152px; border-radius:50%; overflow:hidden; background:var(--cream-warm); box-shadow:0 0 0 3px var(--moss-soft), 0 18px 34px -18px rgba(80,72,40,.42); margin-bottom:26px; }
  .stmt-mascot .sm-poster, .stmt-mascot .sm-vid{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; transform:scale(1.6); transform-origin:68% 34%; }
  .stmt-mascot .sm-vid{ opacity:0; transition:opacity .5s ease; }
  .stmt-mascot .sm-vid.ready{ opacity:1; }
  .stmt-eye{ font-size:10.5px; font-weight:700; letter-spacing:.16em; text-transform:uppercase; color:var(--moss); margin-bottom:12px; }
  .stmt h2{ font-family:var(--font-display); font-weight:800; font-size:29px; line-height:1.16; letter-spacing:-.025em; color:var(--ink); margin:0; text-wrap:balance; }
  .stmt h2 em{ font-style:normal; color:var(--moss-dark); }
  .stmt .stmt-p{ font-size:15px; font-weight:500; line-height:1.5; color:var(--ink-muted); margin:14px 0 0; }

  /* multi chips */
  .chips{ display:flex; flex-wrap:wrap; gap:9px; margin-top:20px; }
  .chp{ cursor:pointer; background:var(--paper-card); border:1.5px solid var(--hairline-strong); border-radius:999px; padding:11px 16px; font-family:var(--font-body); font-weight:700; font-size:14.5px; color:var(--ink); transition:transform .12s ease, background .15s ease, color .15s ease, border-color .15s ease; }
  .chp:hover{ background:var(--cream-warm); }
  .chp:active{ transform:scale(.96); }
  .chp.is-on{ background:var(--moss); color:var(--cream); border-color:var(--moss); box-shadow:0 6px 14px -6px rgba(120,120,56,.5); }

  /* option meta (length) */
  .opt .sub{ font-size:12px; font-weight:500; color:var(--ink-soft); }
  .opt.is-on .sub{ color:var(--moss-cream); }
  .badge-best{ font-size:9px; font-weight:800; letter-spacing:.08em; text-transform:uppercase; color:var(--ink); background:var(--mustard); border-radius:999px; padding:4px 9px; flex:0 0 auto; }

  /* reflection loop */
  .loop{ display:flex; flex-direction:column; gap:7px; margin-top:22px; }
  .loop-item{ display:flex; align-items:center; gap:12px; background:var(--paper-card); border:1px solid var(--hairline); border-radius:14px; padding:13px 15px; opacity:0; transform:translateY(8px); animation:loopin .5s forwards; }
  .loop-item .li{ width:32px; height:32px; border-radius:9px; display:grid; place-items:center; flex:0 0 32px; color:#fff; }
  .loop-item .lt{ font-weight:700; font-size:14.5px; color:var(--ink); letter-spacing:-.01em; }
  .loop-item .ls{ font-size:11.5px; color:var(--ink-soft); font-weight:500; margin-top:1px; }
  .loop-arrow{ text-align:center; color:var(--ink-faint); font-size:15px; line-height:.5; }
  @keyframes loopin{ to{ opacity:1; transform:none; } }

  /* summary */
  .summary-card{ background:var(--paper-card); border:1px solid var(--hairline); border-radius:20px; padding:2px 18px; margin-top:18px; box-shadow:var(--shadow-card); overflow:hidden; }
  .sum-row{ display:flex; gap:13px; align-items:flex-start; padding:14px 0; border-bottom:1px solid var(--hairline); }
  .sum-row:last-child{ border-bottom:none; }
  .sum-ic{ width:34px; height:34px; border-radius:10px; background:var(--cream-warm); color:var(--moss); display:grid; place-items:center; flex:0 0 34px; }
  .sum-k{ font-size:10px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--ink-soft); }
  .sum-v{ font-size:15px; font-weight:700; color:var(--ink); margin-top:3px; letter-spacing:-.01em; line-height:1.3; }
  .sum-row.loop-row{ background:rgba(252,103,8,.06); margin:0 -18px; padding:14px 18px; }
  .sum-row.loop-row .sum-ic{ background:var(--coral-soft); color:var(--sunset); }

  /* loading */
  .loading{ position:relative; flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:0 40px; text-align:center; }
  .loading .ldisc{ width:140px; height:140px; border-radius:50%; overflow:hidden; background:var(--cream); box-shadow:0 22px 50px -22px rgba(80,72,40,.45); }
  .loading .ldisc img{ width:100%; height:100%; object-fit:cover; transform:scale(1.12) translateY(7%); mix-blend-mode:multiply; }
  .load-title{ font-family:var(--font-display); font-weight:800; font-size:21px; letter-spacing:-.02em; color:var(--ink); margin-top:24px; text-wrap:balance; }
  .load-steps{ align-self:stretch; margin-top:26px; display:flex; flex-direction:column; gap:14px; }
  .load-step{ display:flex; align-items:center; gap:12px; opacity:.35; transition:opacity .4s ease; font-weight:600; font-size:14px; color:var(--ink-1); text-align:left; }
  .load-step.done,.load-step.active{ opacity:1; }
  .load-step .lc{ width:24px; height:24px; flex:0 0 24px; border-radius:50%; border:2px solid var(--hairline-strong); position:relative; transition:all .3s ease; }
  .load-step.active .lc{ border-color:var(--moss); }
  .load-step.done .lc{ background:var(--moss); border-color:var(--moss); }
  .load-step.done .lc::after{ content:""; position:absolute; inset:0; background:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 12 12'><path d='M2.5 6.2 L5 8.6 L9.5 3.6' stroke='white' stroke-width='2' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>") center/12px no-repeat; }

  /* preview — locked session (no spoiler audio) */
  .preview-card{ background:var(--paper-card); border:1px solid var(--hairline); border-radius:22px; padding:18px; margin-top:16px; box-shadow:var(--shadow-card); }
  .pc-head{ display:flex; align-items:center; gap:12px; }
  .pc-ava{ width:50px; height:50px; flex:0 0 50px; border-radius:50%; background:url("../assets/kokoro-face.png") 50% 44% / cover no-repeat, var(--cream-warm); }
  .pc-eye{ font-size:10px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:var(--moss); }
  .pc-title{ font-family:var(--font-display); font-weight:800; font-size:17px; letter-spacing:-.01em; color:var(--ink); margin-top:2px; }
  .pc-meta{ display:inline-flex; align-items:center; gap:7px; margin-top:16px; padding:7px 13px; border-radius:999px; background:var(--cream-warm); font-size:12px; font-weight:700; color:var(--ink-muted); white-space:nowrap; }
  .pc-meta svg{ color:var(--moss); }
  .pc-locked{ position:relative; margin-top:16px; border-radius:16px; overflow:hidden; background:var(--cream-warm); border:1px solid var(--hairline); }
  .pc-wave{ display:flex; align-items:center; gap:2px; height:88px; padding:0 16px; }
  .pc-wave span{ flex:1; background:var(--moss-soft); border-radius:2px; min-height:10%; }
  .pc-wave.muted{ filter:saturate(.5) opacity(.5); }
  .pc-lockface{ position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:9px; padding:0 16px; background:linear-gradient(0deg, rgba(239,225,197,.86), rgba(239,225,197,.7)); -webkit-backdrop-filter:blur(3px); backdrop-filter:blur(3px); }
  .pc-lockbtn{ width:42px; height:42px; border-radius:50%; background:var(--paper-card); color:var(--moss-dark); display:grid; place-items:center; box-shadow:0 8px 18px -10px rgba(80,72,40,.5); }
  .pc-locktext{ font-size:12.5px; font-weight:700; color:var(--ink-muted); letter-spacing:.01em; white-space:nowrap; }

  /* name field — large, centred, friendly */
  .namebox{ position:relative; margin-top:26px; display:flex; align-items:center; }
  .namebox-mark{ position:absolute; left:20px; color:var(--moss); display:grid; place-items:center; pointer-events:none; opacity:.65; }
  .namebox-field{
    width:100%; height:74px; padding:0 22px 0 52px;
    background:var(--paper-card); border:2.5px solid var(--hairline-strong); border-radius:20px;
    font-family:var(--font-display); font-weight:800; font-size:26px; letter-spacing:-.01em; color:var(--ink);
    box-shadow:var(--shadow-card); outline:none;
    transition:border-color .2s ease, box-shadow .2s ease;
  }
  .namebox-field::placeholder{ color:var(--ink-faint); font-weight:700; }
  .namebox-field:focus{ border-color:var(--moss); box-shadow:0 0 0 5px rgba(120,120,56,.13); }
  .namebox:focus-within .namebox-mark{ opacity:1; }

  /* ===== preview — celebratory entrance + ambient life ===== */
  .preview-card{ position:relative; }
  .pc-pop{ animation:pcPop .74s cubic-bezier(.34,1.56,.64,1) both; animation-delay:.06s; }
  @keyframes pcPop{ 0%{ opacity:0; transform:translateY(18px) scale(.92);} 60%{ opacity:1;} 100%{ opacity:1; transform:none;} }

  /* "ready" badge pop */
  .pc-ready{ position:absolute; top:-13px; right:16px; z-index:3; display:inline-flex; align-items:center; gap:6px;
    background:var(--moss); color:#fff; font-size:11px; font-weight:800; letter-spacing:.08em; text-transform:uppercase;
    padding:6px 12px 6px 8px; border-radius:999px; box-shadow:0 10px 22px -10px rgba(80,72,40,.7);
    animation:readyPop .6s cubic-bezier(.34,1.7,.5,1) both; animation-delay:.5s; }
  .pc-ready-ck{ width:16px; height:16px; display:grid; place-items:center; }
  .pc-ready-ck svg{ width:13px; height:13px; }
  @keyframes readyPop{ 0%{ opacity:0; transform:scale(.4) rotate(-14deg);} 100%{ opacity:1; transform:none;} }

  /* one-shot confetti-petal burst */
  .pc-burst{ position:absolute; top:46%; left:50%; width:0; height:0; z-index:4; pointer-events:none; }
  .burst-petal{ position:absolute; left:0; top:0; width:11px; height:11px; border-radius:100% 0 100% 0;
    transform:translate(-50%,-50%) scale(.3); opacity:0;
    animation:burstFly 1.15s cubic-bezier(.18,.62,.3,1) forwards; }
  @keyframes burstFly{
    0%{ opacity:0; transform:translate(-50%,-50%) scale(.3) rotate(0);}
    16%{ opacity:1;}
    100%{ opacity:0; transform:translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(1) rotate(var(--rot));} }

  /* ambient drifting petals */
  .qbody:has(.pc-amb){ position:relative; }
  .qbody:has(.pc-amb) > *:not(.pc-amb){ position:relative; z-index:1; }
  .pc-amb{ position:absolute; inset:0; overflow:hidden; pointer-events:none; z-index:0; }
  .amb-petal{ position:absolute; top:-34px; will-change:transform;
    animation-name:ambFall; animation-timing-function:linear; animation-iteration-count:infinite; }
  @keyframes ambFall{ 0%{ transform:translateY(-34px); opacity:0;} 8%{ opacity:.5;} 90%{ opacity:.5;} 100%{ transform:translateY(720px); opacity:0;} }
  .amb-inner{ border-radius:100% 0 100% 0; will-change:transform;
    animation-name:ambSway; animation-timing-function:ease-in-out; animation-iteration-count:infinite; animation-direction:alternate; }
  @keyframes ambSway{ from{ transform:translateX(-13px) rotate(0);} to{ transform:translateX(13px) rotate(190deg);} }

  /* breathing lock */
  .pc-lockbtn{ position:relative; animation:lockBreath 3.2s ease-in-out infinite; }
  @keyframes lockBreath{ 0%,100%{ box-shadow:0 8px 18px -10px rgba(80,72,40,.5);} 50%{ box-shadow:0 12px 26px -8px rgba(120,120,56,.6);} }
  .pc-glow{ position:absolute; inset:-7px; border-radius:50%; border:2px solid var(--moss-soft); opacity:0;
    animation:glowPulse 3.2s ease-out infinite; }
  @keyframes glowPulse{ 0%{ transform:scale(.8); opacity:.6;} 70%{ transform:scale(1.55); opacity:0;} 100%{ opacity:0;} }

  /* living muted waveform behind the frost */
  .pc-wave.live span{ transform-origin:center; animation:wvIdle 2.6s ease-in-out infinite; }
  .pc-wave.live span:nth-child(2n){ animation-delay:.18s; }
  .pc-wave.live span:nth-child(3n){ animation-delay:.42s; }
  .pc-wave.live span:nth-child(5n){ animation-delay:.7s; }
  @keyframes wvIdle{ 0%,100%{ transform:scaleY(.68);} 50%{ transform:scaleY(1.08);} }

  /* bonus reveal */
  .pc-bonus{ display:flex; align-items:center; justify-content:center; gap:8px; margin:16px auto 0; width:fit-content;
    padding:10px 16px; border-radius:999px; background:var(--moss-cream); border:1px solid var(--moss-soft);
    font-size:13px; font-weight:700; color:var(--moss-dark); white-space:nowrap;
    animation:bonusIn .6s cubic-bezier(.34,1.5,.6,1) both; animation-delay:.9s; }
  .pc-bonus svg{ color:var(--mustard-dark); }
  @keyframes bonusIn{ 0%{ opacity:0; transform:translateY(12px) scale(.92);} 100%{ opacity:1; transform:none;} }

  /* shimmering CTA */
  .cta-shine{ position:relative; overflow:hidden; animation:ctaBreath 3s ease-in-out infinite; }
  @keyframes ctaBreath{ 0%,100%{ transform:scale(1);} 50%{ transform:scale(1.022);} }
  .cta-shine::after{ content:""; position:absolute; top:0; left:-60%; width:42%; height:100%;
    background:linear-gradient(100deg, transparent, rgba(255,255,255,.6), transparent); transform:skewX(-18deg);
    animation:ctaSheen 3.6s ease-in-out infinite; }
  @keyframes ctaSheen{ 0%{ left:-60%;} 40%,100%{ left:135%;} }

  /* auth / email */
  .auth{ display:flex; flex-direction:column; gap:10px; margin-top:22px; }
  .auth-btn{ height:54px; border-radius:14px; border:1.5px solid var(--hairline-strong); background:var(--paper-card); color:var(--ink); font-family:var(--font-display); font-weight:700; font-size:15px; display:flex; align-items:center; justify-content:center; gap:10px; cursor:pointer; transition:transform .12s ease, background .15s ease; width:100%; }
  .auth-btn:active{ transform:scale(.99); }
  .auth-btn.dark{ background:var(--ink); color:var(--cream); border-color:var(--ink); }
  .auth-btn svg{ width:19px; height:19px; }
  .auth-sep{ display:flex; align-items:center; gap:12px; color:var(--ink-soft); font-size:11px; font-weight:600; margin:4px 0; }
  .auth-sep::before,.auth-sep::after{ content:""; flex:1; height:1px; background:var(--hairline-strong); }
  .email-row{ display:flex; gap:8px; }
  .email-field{ flex:1; background:var(--paper-card); border:2px solid var(--hairline-strong); border-radius:14px; padding:0 16px; height:54px; font-family:var(--font-body); font-weight:600; font-size:15px; color:var(--ink); outline:none; }
  .email-field:focus{ border-color:var(--moss); box-shadow:0 0 0 4px rgba(120,120,56,.12); }
  .email-go{ width:54px; flex:0 0 54px; border-radius:14px; border:none; background:var(--mustard); color:var(--ink); cursor:pointer; display:grid; place-items:center; }
  .email-go svg{ width:20px; height:20px; }

  /* paywall */
  .pw-disc{ width:92px; height:92px; border-radius:50%; overflow:hidden; background:var(--cream); margin:4px auto 0; box-shadow:0 16px 36px -18px rgba(80,72,40,.45); }
  .pw-disc img{ width:100%; height:100%; object-fit:cover; transform:scale(1.12) translateY(7%); mix-blend-mode:multiply; }
  .pw-title{ font-family:var(--font-display); font-weight:800; font-size:25px; line-height:1.12; letter-spacing:-.02em; text-align:center; color:var(--ink); margin:14px 0 0; text-wrap:balance; }
  .pw-sub{ text-align:center; font-size:13.5px; font-weight:500; color:var(--ink-muted); margin:8px auto 0; max-width:30ch; line-height:1.45; }
  .perks{ margin:18px 0 2px; display:flex; flex-direction:column; gap:1px; }
  .perk{ display:flex; align-items:center; gap:11px; padding:7px 0; font-size:14px; font-weight:600; color:var(--ink-1); }
  .perk .pk{ width:22px; height:22px; flex:0 0 22px; border-radius:50%; background:var(--moss); display:grid; place-items:center; }
  .perk .pk svg{ width:12px; height:12px; color:#fff; }
  .plans{ display:flex; flex-direction:column; gap:10px; margin-top:16px; }
  .plan{ position:relative; display:flex; align-items:center; gap:13px; background:var(--paper-card); border:2px solid var(--hairline-strong); border-radius:16px; padding:15px 16px; cursor:pointer; transition:border-color .15s ease, box-shadow .15s ease; }
  .plan.is-on{ border-color:var(--moss); box-shadow:0 8px 20px -10px rgba(120,120,56,.45); }
  .plan .radio{ width:22px; height:22px; flex:0 0 22px; border-radius:50%; border:2px solid var(--hairline-strong); position:relative; }
  .plan.is-on .radio{ border-color:var(--moss); }
  .plan.is-on .radio::after{ content:""; position:absolute; inset:4px; border-radius:50%; background:var(--moss); }
  .plan .pn{ flex:1; }
  .plan .pn b{ font-family:var(--font-display); font-weight:800; font-size:15.5px; color:var(--ink); letter-spacing:-.01em; }
  .plan .pn span{ display:block; font-size:12px; color:var(--ink-soft); font-weight:500; margin-top:2px; }
  .plan .pp{ font-family:var(--font-display); font-weight:800; font-size:15px; color:var(--ink); text-align:right; line-height:1.1; }
  .plan .pp small{ display:block; font-size:10.5px; color:var(--ink-soft); font-weight:600; }
  .plan .besttag{ position:absolute; top:-9px; right:14px; font-size:9px; font-weight:800; letter-spacing:.08em; text-transform:uppercase; background:var(--mustard); color:var(--ink); border-radius:999px; padding:3px 9px; white-space:nowrap; }
  .pw-note{ display:flex; align-items:center; gap:9px; margin-top:14px; padding:11px 13px; background:var(--cream-warm); border-radius:12px; font-size:12px; font-weight:600; color:var(--ink-muted); line-height:1.35; }
  .pw-note svg{ width:16px; height:16px; color:var(--moss); flex:0 0 16px; }
  .pw-fine{ text-align:center; font-size:11px; color:var(--ink-soft); margin-top:12px; }
  .pw-fine a{ color:var(--ink-muted); text-decoration:underline; cursor:pointer; }

  /* success */
  .success{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:0 32px; }
  .success .sdisc{ width:172px; height:172px; border-radius:50%; overflow:hidden; background:var(--cream); box-shadow:0 24px 54px -24px rgba(80,72,40,.5); }
  .success .sdisc img{ width:100%; height:100%; object-fit:cover; transform:scale(1.12) translateY(6%); mix-blend-mode:multiply; }
  .success .seye{ font-size:11px; font-weight:700; letter-spacing:.18em; text-transform:uppercase; color:var(--moss); margin-top:22px; }
  .success h2{ font-family:var(--font-display); font-weight:800; font-size:28px; line-height:1.14; letter-spacing:-.025em; color:var(--ink); margin:10px 0 0; text-wrap:balance; }
  .success .sp{ font-size:14px; color:var(--ink-muted); font-weight:500; margin:10px 0 0; line-height:1.5; }

  /* commitment pledge */
  .commit-body{ display:flex; flex-direction:column; }
  .commit-body .qtitle, .commit-body .commit-eye{ flex-shrink:0; }
  .pledge, .hold-wrap{ flex-shrink:0; }
  .commit-eye{ font-size:10.5px; font-weight:700; letter-spacing:.16em; text-transform:uppercase; color:var(--moss); margin-top:6px; }
  .commit-body .qtitle{ margin-top:10px; }
  .pledge{ position:relative; margin-top:20px; background:var(--paper-card); border:1px solid var(--hairline); border-radius:20px; padding:30px 22px 22px; box-shadow:var(--shadow-card); }
  .pledge-mark{ position:absolute; top:8px; left:18px; font-family:var(--font-serif); font-size:52px; line-height:1; color:var(--moss-soft); }
  .pledge p{ position:relative; margin:0; font-family:var(--font-serif); font-style:italic; font-size:21px; line-height:1.4; color:var(--ink); text-wrap:pretty; }
  .pledge p em{ font-style:italic; color:var(--moss-dark); }
  .pledge-by{ margin-top:14px; font-family:var(--font-body); font-size:12px; font-weight:700; letter-spacing:.02em; color:var(--ink-soft); }
  .hold-wrap{ display:flex; flex-direction:column; align-items:center; gap:14px; padding:6px 0 calc(20px + env(safe-area-inset-bottom)); }
  .hold{ position:relative; width:150px; height:150px; border-radius:50%; border:none; background:var(--cream-warm); cursor:pointer; display:grid; place-items:center; -webkit-tap-highlight-color:transparent; touch-action:none; transition:background .35s ease, transform .18s ease; }
  .hold:active{ transform:scale(.97); }
  .hold-ring{ position:absolute; inset:0; width:100%; height:100%; pointer-events:none; }
  .hr-bg{ fill:none; stroke:var(--cream-deep); stroke-width:7; }
  .hr-fg{ fill:none; stroke:var(--moss); stroke-width:7; stroke-linecap:round; stroke-dasharray:339.3; stroke-dashoffset:339.3; transform:rotate(-90deg); transform-origin:center; }
  .hold.filling .hr-fg{ stroke-dashoffset:0; transition:stroke-dashoffset 2.6s linear; }
  .hold-label{ font-family:var(--font-display); font-weight:800; font-size:15px; line-height:1.15; color:var(--ink); text-align:center; transition:opacity .3s ease; }
  .hold-check{ position:absolute; inset:0; display:grid; place-items:center; opacity:0; transform:scale(.55); transition:opacity .35s ease, transform .4s cubic-bezier(.3,1.5,.5,1); }
  .hold-check svg{ width:48px; height:48px; color:var(--moss); }
  .hold.done{ background:var(--moss-soft); }
  .hold.done .hold-label{ opacity:0; }
  .hold.done .hold-check{ opacity:1; transform:scale(1); }
  .hold-hint{ font-size:12px; font-weight:600; color:var(--ink-soft); text-align:center; }

  /* ===================================================== */
  /*  NEW \u2014 section label (replaces step counter)          */
  /* ===================================================== */
  .seclbl{
    font-family:var(--font-body); font-size:11px; font-weight:700;
    color:var(--moss-dark); letter-spacing:.01em; flex:0 0 auto;
    min-width:74px; text-align:right; white-space:nowrap;
  }

  /* ===================================================== */
  /*  NEW \u2014 relate (resonance + felt-temperature scale)    */
  /* ===================================================== */
  .rel{ }
  .rel-eye{ font-size:10.5px; font-weight:700; letter-spacing:.16em; text-transform:uppercase; color:var(--moss); }
  .rel-quote{
    margin:14px 0 0; padding:0;
    font-family:var(--font-serif); font-style:italic; font-weight:400;

  }
  .scale{ display:flex; align-items:center; justify-content:space-between; gap:10px; margin-top:34px; padding:0 4px; }
  /* relate slider */

  .snode{

  }
  .snode .dot{
    width:20px; height:20px; border-radius:50%;

  /* ===================================================== */

  .map-eye{ font-size:10.5px; font-weight:700; letter-spacing:.16em; text-transform:uppercase; color:var(--moss); }

  .rv-marker{ position:absolute; top:50%; left:8%; width:26px; height:26px; border-radius:50%; background:#fff;

  .pr-k{ font-family:var(--font-display); font-weight:800; font-size:14.5px; color:var(--ink); letter-spacing:-.01em; }

  @media (prefers-reduced-motion:reduce){ *{ animation:none !important; } }
</style>
